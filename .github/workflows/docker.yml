name: Docker

on:
  push:
    branches:
      - main
    paths:
      - "images/**"
      - ".env"
      - ".github/workflows/docker.yml"

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      images: ${{ steps.list.outputs.images }}
    steps:
      - uses: actions/checkout@v4

      - name: List images
        id: list
        run: |
          images=$(find images -mindepth 1 -maxdepth 1 -type d -printf '%f\n' | jq -R . | jq -sc .)
          echo "images=$images" >> "$GITHUB_OUTPUT"

  build:
    needs: discover
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: ${{ fromJson(needs.discover.outputs.images) }}
    steps:
      - uses: actions/checkout@v4

      - name: Load .env
        run: |
          set -a && source .env && set +a
          echo "DOCKER_HUB_ORG=$DOCKER_HUB_ORG"       >> "$GITHUB_ENV"
          echo "DOCKER_HUB_TAG=$DOCKER_HUB_TAG"       >> "$GITHUB_ENV"
          echo "DOCKER_BUILD_PLATFORM=$DOCKER_BUILD_PLATFORM" >> "$GITHUB_ENV"

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: images/${{ matrix.image }}
          platforms: ${{ env.DOCKER_BUILD_PLATFORM }}
          push: true
          tags: ${{ env.DOCKER_HUB_ORG }}/${{ matrix.image }}:${{ env.DOCKER_HUB_TAG }}
